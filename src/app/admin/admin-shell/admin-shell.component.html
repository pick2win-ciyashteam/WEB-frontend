<div class="admin-layout" [class.sidebar-open]="sidebarOpen">
  <div class="admin-backdrop" (click)="closeSidebar()"></div>

  <app-admin-sidebar (logoutClicked)="logout()"></app-admin-sidebar>

  <section class="main">
    <app-admin-header
      [title]="currentTitle"
      [crumb]="currentCrumb"
      (menuClicked)="toggleSidebar()"
      (userSearch)="searchUsers($event)"
      (logoutClicked)="logout()">
    </app-admin-header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
