<div class="admin-layout" [class.sidebar-open]="sidebarOpen">
  <div class="admin-backdrop" (click)="closeSidebar()"></div>

  <aside class="admin-sidebar">
    <div class="brand">
      <img src="assets/logo.png" alt="Pick2Win">
      <div>
        <span>Pick2Win</span>
        <b>Admin</b>
      </div>
    </div>

    <nav class="side-nav" aria-label="Admin navigation">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        routerLinkActive="active">
        <span class="material-symbols-outlined" aria-hidden="true">{{ item.icon }}</span>
        {{ item.label }}
      </a>
    </nav>

    <button class="logout-side" type="button" (click)="logout()">
      <span class="material-symbols-outlined" aria-hidden="true">logout</span>
      <b>Logout</b>
    </button>
  </aside>

  <section class="admin-main">
    <header class="admin-header">
      <button class="menu-btn" type="button" aria-label="Open admin menu" (click)="toggleSidebar()">
        <span class="material-symbols-outlined" aria-hidden="true">menu</span>
      </button>

      <div>
        <span>Admin Console</span>
        <h1>{{ currentTitle }}</h1>
      </div>

      <button class="logout-top" type="button" (click)="logout()">
        <span class="material-symbols-outlined" aria-hidden="true">logout</span>
        <b>Logout</b>
      </button>
    </header>

    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
