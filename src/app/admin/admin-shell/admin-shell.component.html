<div class="admin-layout" [class.sidebar-open]="sidebarOpen">
  <div class="admin-backdrop" (click)="closeSidebar()"></div>

  <aside class="admin-sidebar">
    <div class="sb-brand">
      <img class="sb-brand-img" src="assets/logo.png" alt="Pick2Win">
      <div class="sb-name">
        <span class="n">PICK2WIN</span>
        <span class="t">ADMIN</span>
      </div>
    </div>

    <div class="sb-section">Core</div>

    <nav class="sb-nav" aria-label="Admin navigation">
      <a
        *ngFor="let item of navItems"
        class="sb-link"
        [routerLink]="item.route"
        routerLinkActive="active">
        <span class="material-symbols-outlined sb-icn" aria-hidden="true">{{ item.icon }}</span>
        {{ item.label }}
      </a>
    </nav>

    <div class="sb-foot">
      <div class="sb-user">
        <div class="sb-avatar">AD</div>
        <div class="sb-user-info">
          <span class="sb-user-name">Admin User</span>
          <span class="sb-user-role">Super Admin</span>
        </div>
        <button class="sb-logout" type="button" aria-label="Logout" (click)="logout()">
          <span class="material-symbols-outlined" aria-hidden="true">logout</span>
        </button>
      </div>
    </div>
  </aside>

  <section class="main">
    <header class="topbar">
      <button class="menu-btn" type="button" aria-label="Open admin menu" (click)="toggleSidebar()">
        <span class="material-symbols-outlined" aria-hidden="true">menu</span>
      </button>

      <div class="crumb">
        <span>PICK2WIN</span>
        <span class="sep">/</span>
        <b>{{ currentTitle }}</b>
      </div>

      <div class="search-wrap">
        <span class="material-symbols-outlined" aria-hidden="true">search</span>
        <input class="search-input" type="search" placeholder="Search admin console">
        <span class="search-kbd">CTRL K</span>
      </div>

      <div class="top-actions">
        <span class="env-pill">LIVE</span>
        <button class="icon-btn" type="button" aria-label="Logout" (click)="logout()">
          <span class="material-symbols-outlined" aria-hidden="true">logout</span>
        </button>
      </div>
    </header>

    <main class="page">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
