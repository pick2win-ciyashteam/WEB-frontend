<header class="site">
  <div class="site-inner">

    <a routerLink="/" class="logo" (click)="closeMenu()">
      <img src="assets/logo.png" alt="Pick2Win">
    </a>

    <nav class="primary">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/uctinfo" routerLinkActive="active">UCT Guide</a>
      <a *ngIf="loggedIn$ | async" routerLink="/lineouts" routerLinkActive="active">Lineouts</a>
      <a routerLink="/pricing" routerLinkActive="active">Pricing</a>
      <!-- <a routerLink="/about" routerLinkActive="active">About</a> -->
      <a routerLink="/trust" routerLinkActive="active">Trust</a>
      <a routerLink="/faq" routerLinkActive="active">FAQ</a>
    </nav>

    <div class="header-auth" *ngIf="loggedIn$ | async; else desktopGuestActions">
      <button type="button" class="btn-signin header-profile" (click)="openMySpace()">
        <span class="icon-user"></span>
        My Space
      </button>
      <button type="button" class="header-cta header-signout" (click)="signOut()">
        <span class="icon-logout"></span>
        Signout
      </button>
    </div>

    <ng-template #desktopGuestActions>
      <div class="header-auth">
        <button type="button" class="btn-signin" (click)="openLogin()">Sign In</button>
        <button type="button" class="header-cta" (click)="openSignup()">Join PICK2WIN -></button>
      </div>
    </ng-template>

    <button class="menu-btn" (click)="toggleMenu()" [class.open]="isMenuOpen">
      <span></span><span></span><span></span>
    </button>

  </div>
</header>

<div class="drawer-backdrop" [class.show]="isMenuOpen" (click)="closeMenu()"></div>

<aside class="mobile-drawer" [class.show]="isMenuOpen">
  <div class="drawer-head">
    <img src="assets/logo.png" alt="Pick2Win">
    <button (click)="closeMenu()">x</button>
  </div>

  <nav class="drawer-nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
    <a routerLink="/uctinfo" routerLinkActive="active" (click)="closeMenu()">UCT Guide</a>
    <a *ngIf="loggedIn$ | async" routerLink="/lineouts" routerLinkActive="active" (click)="closeMenu()">Lineouts</a>
    <a routerLink="/pricing" routerLinkActive="active" (click)="closeMenu()">Pricing</a>
    <!-- <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a> -->
    <a routerLink="/trust" routerLinkActive="active" (click)="closeMenu()">Trust</a>
    <a routerLink="/faq" routerLinkActive="active" (click)="closeMenu()">FAQ</a>
  </nav>

  <div class="drawer-actions" *ngIf="loggedIn$ | async; else drawerGuestActions">
    <button type="button" class="drawer-profile" (click)="openMySpace()">
      <span class="icon-user"></span>
      My Space
    </button>
    <button type="button" class="drawer-signout" (click)="signOut()">
      <span class="icon-logout"></span>
      Signout
    </button>
  </div>

  <ng-template #drawerGuestActions>
    <div class="drawer-actions">
      <button type="button" (click)="openLogin()">Sign In</button>
      <button type="button" (click)="openSignup()">Join PICK2WIN -></button>
    </div>
  </ng-template>

</aside>
